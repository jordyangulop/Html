<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modal Simple</title>

    <style>

        /* Estilos del modal */

        .modal {

            display: none; /* Oculto por defecto */

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background-color: rgba(0,0,0,0.5); /* Fondo semitransparente */

            justify-content: center;

            align-items: center;

            z-index: 1000;

        }


        /* Contenido de la ventana */

        .modal-contenido {

            background: white;

            padding: 25px;

            border-radius: 12px;

            width: 90%;

            max-width: 400px;

            text-align: center;

            box-shadow: 0 5px 15px rgba(0,0,0,0.3);

            position: relative;

        }


        /* Botón de cerrar (X) */

        .cerrar {

            position: absolute;

            top: 10px;

            right: 15px;

            font-size: 24px;

            cursor: pointer;

            color: #888;

        }

        .cerrar:hover {

            color: black;

        }


        /* Botón de abrir modal */

        .btn-abrir {

            background: purple;

            color: white;

            border: none;

            padding: 12px 24px;

            border-radius: 30px;

            font-size: 16px;

            cursor: pointer;

        }

        .btn-abrir:hover {

            background: rgb(141, 0, 141);

        }

    </style>

</head>

<body>


    <button class="btn-abrir" id="abrirModal">Abrir ventana modal</button>


    <!-- Estructura del modal -->

    <div id="miModal" class="modal">

        <div class="modal-contenido">

            <span class="cerrar" id="cerrarModal">&times;</span>

            <h2>¡Hola, soy una modal!</h2>

            <p>Este es un contenido básico y simple.<br>Puedes poner aquí texto, imágenes o lo que necesites.</p>

            <button id="botonCerrarInterno">Cerrar</button>

        </div>

    </div>


    <script>

        // Obtener elementos

        const modal = document.getElementById('miModal');

        const btnAbrir = document.getElementById('abrirModal');

        const btnCerrar = document.getElementById('cerrarModal');

        const btnCerrarInterno = document.getElementById('botonCerrarInterno');


        // Abrir modal

        btnAbrir.addEventListener('click', () => {

            modal.style.display = 'flex';

        });


        // Cerrar modal con la X

        btnCerrar.addEventListener('click', () => {

            modal.style.display = 'none';

        });


        // Cerrar modal con el botón interno

        btnCerrarInterno.addEventListener('click', () => {

            modal.style.display = 'none';

        });


        // Cerrar modal si se hace clic fuera del contenido (en el fondo oscuro)

        modal.addEventListener('click', (e) => {

            if (e.target === modal) {

                modal.style.display = 'none';

            }

        });

    </script>

</body>

</html>
